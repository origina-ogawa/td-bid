<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #fff; color: #1a1a1a; line-height: 1.7; }
    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    @media (max-width: 768px) {
      header > div {
        padding: 0 16px !important;
        height: auto !important;
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 16px !important;
      }
      header nav {
        width: 100%;
        flex-direction: column !important;
        gap: 12px !important;
      }
      header nav a {
        font-size: 12px !important;
      }
      section {
        padding: 40px 16px !important;
      }
      h1 {
        font-size: 24px !important;
      }
      h2 {
        font-size: 18px !important;
      }
      div[style*="grid-template-columns: repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
        gap: 16px !important;
      }
      div[style*="grid-template-columns: 1fr 1fr"] {
        grid-template-columns: 1fr !important;
        gap: 32px !important;
      }
      div[style*="grid-template-columns: 140px 1fr"] {
        grid-template-columns: 1fr !important;
        gap: 8px !important;
      }
      div[style*="display: flex"][style*="justify-content: space-between"] {
        flex-direction: column !important;
        gap: 24px !important;
      }
      table {
        font-size: 13px !important;
      }
      table td {
        padding: 12px 12px 12px 0 !important;
        display: block !important;
        width: 100% !important;
        text-align: left !important;
      }
      table tr {
        display: block !important;
        margin-bottom: 16px !important;
        padding-bottom: 16px !important;
      }
    }
  </style>
</helmet>

<!-- HEADER -->
<header style="position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e8e8e8;">
  <div style="max-width: 1080px; margin: 0 auto; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px;">
    <a href="index.html" style="display: flex; flex-direction: column; gap: 1px;">
      <span style="font-size: 11px; letter-spacing: 0.12em; color: #888; font-weight: 500;">TANO DAIKON LLC</span>
      <span style="font-size: 15px; font-weight: 700; letter-spacing: 0.05em; color: #1a1a1a;">合同会社田野大根　入札情報</span>
    </a>
    <nav style="display: flex; gap: 32px; align-items: center;">
      <a href="index.html" style="font-size: 13px; font-weight: 500; color: #2d5a27; border-bottom: 1.5px solid #2d5a27; padding-bottom: 2px;">TOP</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section style="background: #f5f7f5; border-bottom: 1px solid #e8e8e8; padding: 72px 32px 64px;">
  <div style="max-width: 1080px; margin: 0 auto;">
    <p style="font-size: 12px; letter-spacing: 0.18em; color: #2d5a27; font-weight: 600; text-transform: uppercase; margin-bottom: 16px;">入札関連情報</p>
    <h1 style="font-size: 32px; font-weight: 700; letter-spacing: 0.04em; color: #1a1a1a; line-height: 1.4; margin-bottom: 20px;">入札情報</h1>
    <p style="font-size: 14px; color: #555; max-width: 560px; line-height: 1.9;">合同会社田野大根の入札情報を掲載しています。新たな入札が公告され次第、本ページにてご案内いたします。</p>
  </div>
</section>

<!-- EMPTY STATE -->
<section style="padding: 80px 32px; max-width: 1080px; margin: 0 auto;">
  <div style="text-align: center; padding: 64px 32px; background: #f5f7f5; border: 1px solid #e8e8e8; border-radius: 4px;">
    <p style="font-size: 16px; font-weight: 600; color: #555; letter-spacing: 0.04em;">現在公告中の入札情報はありません</p>
  </div>
</section>

<!-- COMPANY INFO -->
<section style="padding: 64px 32px; border-top: 1px solid #e8e8e8;">
  <div style="max-width: 1080px; margin: 0 auto;">
    <div>
      <p style="font-size: 12px; letter-spacing: 0.18em; color: #2d5a27; font-weight: 600; margin-bottom: 8px;">ABOUT</p>
      <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 24px;">会社情報</h2>
      <div style="display: flex; flex-direction: column; gap: 14px;">
        <div style="display: flex; gap: 16px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0;">
          <span style="font-size: 12px; color: #888; font-weight: 600; width: 80px; flex-shrink: 0; padding-top: 2px;">会社名</span>
          <span style="font-size: 14px; color: #1a1a1a; font-weight: 600;">合同会社田野大根</span>
        </div>
        <div style="display: flex; gap: 16px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0;">
          <span style="font-size: 12px; color: #888; font-weight: 600; width: 80px; flex-shrink: 0; padding-top: 2px;">所在地</span>
          <span style="font-size: 14px; color: #1a1a1a;">〒889-1702<br/>宮崎県宮崎市田野町乙5057</span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer style="background: #1a1a1a; color: #fff; padding: 32px;">
  <div style="max-width: 1080px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 24px;">
    <div>
      <p style="font-size: 13px; font-weight: 700; margin-bottom: 4px;">合同会社田野大根</p>
      <p style="font-size: 11px; color: #888;">〒889-1702 宮崎県宮崎市田野町乙5057</p>
    </div>
    <p style="font-size: 11px; color: #666;">© 2026 合同会社田野大根. All rights reserved.</p>
  </div>
</footer>
</x-dc>
</body>
</html>
